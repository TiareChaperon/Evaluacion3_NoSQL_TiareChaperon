<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="./css/brite.css" />
  <link rel="stylesheet" href="./css/estilos.css" />

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./scripts/dispositivo.js"></script>

  <title>Formulario Dispositivo</title>
</head>

<body>
  <div class="container">
    <nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
      <div class="container-fluid">
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" href="./datos.html">Usuarios</a></li>
            <li class="nav-item"><a class="nav-link" href="./formulario.html">Formulario Usuario</a></li>
            <li class="nav-item"><a class="nav-link" href="./datosDispositivos.html">Dispositivos</a></li>
            <li class="nav-item"><a class="nav-link" href="./dispositivo.html">Formulario Dispositivo</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </div>

  <br />

  <div class="container">
    <p class="h3">Formulario Dispositivo Electrónico</p>
    <br />

    <form id="formularioDispositivo">
      <div class="row">
        <div class="col">
          <label for="selectUsuario" class="form-label">Usuario:</label>
          <select id="selectUsuario" name="usuario" class="form-select">
            <option value="">Seleccione usuario...</option>
          </select>
        </div>

        <div class="col">
          <label for="inputTipo" class="form-label">Tipo:</label>
          <input type="text" id="inputTipo" name="tipo" class="form-control" />
        </div>

        <div class="col">
          <label for="inputMarca" class="form-label">Marca:</label>
          <input type="text" id="inputMarca" name="marca" class="form-control" />
        </div>
      </div>

      <br />

      <div class="row">
        <div class="col">
          <label for="inputModelo" class="form-label">Modelo:</label>
          <input type="text" id="inputModelo" name="modelo" class="form-control" />
        </div>

        <div class="col">
          <label for="inputSerie" class="form-label">Serie:</label>
          <input type="text" id="inputSerie" name="serie" class="form-control" />
        </div>

        <div class="col">
          <label for="inputFechaCompra" class="form-label">Fecha Compra:</label>
          <input type="date" id="inputFechaCompra" name="fechaCompra" class="form-control" />
        </div>
      </div>

      <br />

      <div class="row">
        <div class="col">
          <label for="inputGarantia" class="form-label">Garantía Meses:</label>
          <input type="number" id="inputGarantia" name="garantiaMeses" class="form-control" />
        </div>

        <div class="col">
          <label for="inputSistema" class="form-label">Sistema Operativo:</label>
          <input type="text" id="inputSistema" name="sistemaOperativo" class="form-control" />
        </div>

        <div class="col">
          <label for="inputEstado" class="form-label">Estado:</label>
          <input type="text" id="inputEstado" name="estado" class="form-control" />
        </div>
      </div>

      <br />

      <div class="row">
        <div class="col">
          <label for="inputValor" class="form-label">Valor:</label>
          <input type="number" id="inputValor" name="valor" class="form-control" />
        </div>
      </div>

      <br />

      <div class="row">
        <div class="col d-flex justify-content-end">
          <input type="reset" value="Cancelar" class="btn btn-secondary me-2" />
          <button type="button" class="btn btn-primary" onclick="guardarDispositivo()">
            Enviar
          </button>
        </div>
      </div>
    </form>
  </div>
</body>

</html>
